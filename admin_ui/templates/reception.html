<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Reception Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; }
    header { padding: 12px 16px; border-bottom: 1px solid #ddd; }
    .wrap { display: grid; grid-template-columns: 380px 1fr; height: calc(100vh - 54px); }
    .left { border-right: 1px solid #ddd; overflow: auto; }
    .right { padding: 16px; overflow: auto; }
    .item { padding: 12px 12px; border-bottom: 1px solid #eee; cursor: pointer; }
    .item:hover { background: #f7f7f7; }
    .muted { color: #666; font-size: 12px; }
    .pill { display:inline-block; padding:2px 8px; border:1px solid #ccc; border-radius:999px; font-size:12px; }
    textarea { width: 100%; min-height: 90px; }
    input[type="text"] { width: 100%; padding: 8px; }
    button { padding: 10px 12px; margin-right: 8px; margin-top: 8px; cursor: pointer; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .card { border: 1px solid #eee; border-radius: 10px; padding: 12px; }
  </style>
</head>
<body>
<header>
  <b>Reception Dashboard</b>
  <span class="muted"> — token required (X-Reception-Token)</span>
</header>

<div class="wrap">
  <div class="left">
    <div style="padding:12px;">
      <label>Status:</label>
      <select id="status">
        <option>PENDING</option>
        <option>APPROVED</option>
        <option>REJECTED</option>
        <option>CONTACTED</option>
        <option>ALL</option>
      </select>
      <button onclick="loadList()">Refresh</button>
    </div>
    <div id="list"></div>
  </div>

  <div class="right">
    <div id="detail" class="muted">Select a request from the left.</div>
  </div>
</div>

<script>
  // easiest MVP: pass token in URL: /reception?token=...
  const token = new URLSearchParams(location.search).get("token") || "";

  function headers() {
    return token ? { "X-Reception-Token": token } : {};
  }

  async function loadList() {
    const status = document.getElementById("status").value;
    const r = await fetch(`/api/reception/requests?status=${encodeURIComponent(status)}`, { headers: headers() });
    const j = await r.json();
    if (!j.ok) { alert("Error loading list"); return; }

    const el = document.getElementById("list");
    el.innerHTML = "";
    for (const it of j.items) {
      const div = document.createElement("div");
      div.className = "item";
      div.onclick = () => loadDetail(it.request_id);
      div.innerHTML = `
        <div><b>${it.request_id}</b> <span class="pill">${it.status}</span></div>
        <div class="muted">${it.patient_name || ""} — ${it.patient_mobile || ""}</div>
        <div class="muted">${it.dept_label || ""} — ${it.doctor_label || ""}</div>
        <div class="muted">${it.appt_date || ""} — ${it.appt_time || ""}</div>
      `;
      el.appendChild(div);
    }
  }

  async function loadDetail(requestId) {
    const r = await fetch(`/api/reception/requests/${encodeURIComponent(requestId)}`, { headers: headers() });
    const j = await r.json();
    if (!j.ok) { alert("Error loading item"); return; }

    const it = j.item;
    document.getElementById("detail").innerHTML = `
      <div class="card">
        <div><b>${it.request_id}</b> <span class="pill">${it.status}</span></div>
        <div class="muted">Created: ${it.created_at} | Updated: ${it.updated_at}</div>
        <hr/>

        <div class="row">
          <div>
            <div><b>Patient</b></div>
            <div>${it.patient_name || "-"}</div>
            <div class="muted">${it.patient_mobile || "-"}</div>
          </div>
          <div>
            <div><b>Appointment</b></div>
            <div>${it.dept_label || "-"}</div>
            <div>${it.doctor_label || "-"}</div>
            <div class="muted">${it.appt_date || ""} — ${it.appt_time || ""}</div>
          </div>
        </div>

        <hr/>
        <div><b>Receptionist note</b></div>
        <textarea id="note">${it.receptionist_note || ""}</textarea>

        <div style="margin-top:10px;"><b>Optional WhatsApp message</b></div>
        <input id="msg" type="text" placeholder="Type message to patient (optional)" />

        <div style="margin-top:10px;">
          <button onclick="updateStatus('${it.request_id}', 'APPROVED')">Approve</button>
          <button onclick="updateStatus('${it.request_id}', 'REJECTED')">Reject</button>
          <button onclick="updateStatus('${it.request_id}', 'CONTACTED')">Mark Contacted</button>
        </div>
      </div>
    `;
  }

  async function updateStatus(requestId, status) {
    const note = (document.getElementById("note") || {}).value || "";
    const msg = (document.getElementById("msg") || {}).value || "";
    const send_message = msg.trim().length > 0;

    const r = await fetch(`/api/reception/requests/${encodeURIComponent(requestId)}/update`, {
      method: "POST",
      headers: Object.assign({ "Content-Type": "application/json" }, headers()),
      body: JSON.stringify({
        status,
        receptionist_note: note,
        send_message,
        message_text: msg
      })
    });

    const j = await r.json();
    if (!j.ok) {
      alert("Update failed: " + (j.detail || "unknown"));
      return;
    }
    await loadList();
    await loadDetail(requestId);
  }

  loadList();
</script>
</body>
</html>
